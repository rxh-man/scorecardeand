<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>IoT Ops Scorecard — Governance Dashboard</title>
    <meta
      name="description"
      content="Opening the IoT Ops governance scorecard dashboard."
    />
    <meta http-equiv="refresh" content="0; url=https://scorecardeand.lovable.app/" />
    <link rel="canonical" href="https://scorecardeand.lovable.app/" />
    <style>
      :root {
        --background: #ffffff;
        --foreground: #1a1a1a;
        --muted: #555555;
        --border: #e0e0e0;
        --primary: #c0392b;
        --rose: #fdecea;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: var(--background);
        color: var(--foreground);
        font-family: Inter, Arial, Helvetica, sans-serif;
      }

      main {
        width: min(680px, calc(100vw - 32px));
        border: 1px solid var(--border);
        padding: 32px;
        background: #fff;
      }

      .eyebrow {
        color: var(--primary);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      h1 {
        margin: 10px 0 8px;
        font-size: clamp(28px, 5vw, 40px);
        line-height: 1.08;
      }

      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.6;
      }

      .status {
        margin-top: 22px;
        padding: 14px 16px;
        background: var(--rose);
        border-left: 4px solid var(--primary);
        color: var(--foreground);
        font-weight: 600;
      }

      .actions {
        margin-top: 22px;
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 42px;
        padding: 0 16px;
        border: 1px solid var(--primary);
        color: var(--primary);
        text-decoration: none;
        font-weight: 600;
      }

      a.primary {
        background: var(--primary);
        color: #fff;
      }
    </style>
    <script>
      (function () {
        var knownRoutes = new Set(["submit", "governance"]);
        var segments = window.location.pathname.split("/").filter(Boolean);
        var lastSegment = segments[segments.length - 1] || "";
        var route = knownRoutes.has(lastSegment) ? "/" + lastSegment : "/";
        var target = "https://scorecardeand.lovable.app" + route + window.location.search + window.location.hash;
        window.location.replace(target);
      })();
    </script>
  </head>
  <body>
    <main>
      <div class="eyebrow">IoT Delivery &amp; Operations</div>
      <h1>Opening governance dashboard…</h1>
      <p>
        This GitHub Pages entry now forwards directly to the live scorecard experience so you no
        longer land on the repository README.
      </p>
      <div class="status">Redirecting to the dashboard now.</div>
      <div class="actions">
        <a class="primary" href="https://scorecardeand.lovable.app/">Open dashboard</a>
        <a href="https://scorecardeand.lovable.app/submit">Open submit view</a>
        <a href="https://scorecardeand.lovable.app/governance">Open governance view</a>
      </div>
    </main>
  </body>
</html>
